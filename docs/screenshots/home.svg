    <text x="12" y="112" font-family="Arial" font-size="11" fill="#888">취업</text>
    <text x="12" y="130" font-family="Arial" font-size="13" font-weight="bold" fill="#1A1A1A">NCS 직업기초능력 완전정복</text>
    <text x="12" y="148" font-family="Arial" font-size="11" fill="#FFB800">★ 4.7</text>
    <text x="12" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#1A1A1A">219,000원</text>
  </g>
</svg>
