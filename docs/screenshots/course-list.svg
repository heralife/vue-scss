  <g transform="translate(860,216)">
    <rect width="278" height="195" rx="8" fill="white" filter="url(#s)"/>
    <rect width="278" height="105" rx="8 8 0 0" fill="#4A90D9"/>
    <text x="12" y="127" font-family="Arial" font-size="11" fill="#888">TOEIC</text>
    <text x="12" y="147" font-family="Arial" font-size="13" font-weight="bold" fill="#1A1A1A">토익 입문 기초반</text>
    <text x="12" y="165" font-family="Arial" font-size="11" fill="#FFB800">★ 4.6</text>
    <text x="12" y="185" font-family="Arial" font-size="14" font-weight="bold" fill="#1A1A1A">99,000원</text>
  </g>

  <g transform="translate(272,428)">
    <rect width="278" height="195" rx="8" fill="white" filter="url(#s)"/>
    <rect width="278" height="105" rx="8 8 0 0" fill="#E31837"/>
    <text x="12" y="127" font-family="Arial" font-size="11" fill="#888">TOEFL</text>
    <text x="12" y="147" font-family="Arial" font-size="13" font-weight="bold" fill="#1A1A1A">해커스 토플 iBT 80+ 종합반</text>
    <text x="12" y="165" font-family="Arial" font-size="11" fill="#FFB800">★ 4.8</text>
    <text x="12" y="185" font-family="Arial" font-size="14" font-weight="bold" fill="#1A1A1A">299,000원</text>
  </g>

  <g transform="translate(566,428)">
    <rect width="278" height="195" rx="8" fill="white" filter="url(#s)"/>
    <rect width="278" height="105" rx="8 8 0 0" fill="#C41230"/>
    <rect x="8" y="8" width="36" height="18" rx="9" fill="#00A651"/>
    <text x="14" y="21" font-family="Arial" font-size="10" fill="white" font-weight="bold">NEW</text>
    <text x="12" y="127" font-family="Arial" font-size="11" fill="#888">TOEFL</text>
    <text x="12" y="147" font-family="Arial" font-size="13" font-weight="bold" fill="#1A1A1A">토플 Speaking 집중반</text>
    <text x="12" y="165" font-family="Arial" font-size="11" fill="#FFB800">★ 4.7</text>
    <text x="12" y="185" font-family="Arial" font-size="14" font-weight="bold" fill="#1A1A1A">189,000원</text>
  </g>

  <g transform="translate(860,428)">
    <rect width="278" height="195" rx="8" fill="white" filter="url(#s)"/>
    <rect width="278" height="105" rx="8 8 0 0" fill="#FF6B00"/>
    <rect x="8" y="8" width="48" height="18" rx="9" fill="#E31837"/>
    <text x="14" y="21" font-family="Arial" font-size="10" fill="white" font-weight="bold">베스트</text>
    <text x="12" y="127" font-family="Arial" font-size="11" fill="#888">영어회화</text>
    <text x="12" y="147" font-family="Arial" font-size="13" font-weight="bold" fill="#1A1A1A">왕초보 영어회화 탈출</text>
    <text x="12" y="165" font-family="Arial" font-size="11" fill="#FFB800">★ 4.8</text>
    <text x="12" y="185" font-family="Arial" font-size="14" font-weight="bold" fill="#1A1A1A">79,000원</text>
  </g>

  <!-- Pagination -->
  <rect x="540" y="648" width="36" height="36" rx="4" fill="#E31837"/>
  <text x="553" y="671" font-family="Arial" font-size="14" fill="white" font-weight="bold">1</text>
  <rect x="584" y="648" width="36" height="36" rx="4" fill="white"/>
  <text x="597" y="671" font-family="Arial" font-size="14" fill="#888">2</text>
  <rect x="628" y="648" width="36" height="36" rx="4" fill="white"/>
  <text x="641" y="671" font-family="Arial" font-size="14" fill="#888">3</text>
</svg>
