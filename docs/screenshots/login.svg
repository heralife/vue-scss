<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <rect width="1200" height="750" fill="#f5f5f5"/>
  <defs><filter id="s"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.1"/></filter></defs>

  <!-- Header -->
  <rect width="1200" height="64" fill="#ffffff"/>
  <text x="32" y="40" font-family="Arial" font-size="22" font-weight="bold" fill="#E31837">해커스<tspan fill="#1A2B5F">교육</tspan></text>

  <!-- Category Nav -->
  <rect y="64" width="1200" height="48" fill="#1A2B5F"/>

  <!-- Login Box -->
  <rect x="380" y="132" width="440" height="560" rx="12" fill="white" filter="url(#s)"/>

  <text x="600" y="196" font-family="Arial" font-size="26" font-weight="bold" fill="#1A1A1A" text-anchor="middle">로그인</text>

  <!-- Email Field -->
  <text x="416" y="238" font-family="Arial" font-size="13" font-weight="bold" fill="#555">이메일</text>
  <rect x="416" y="248" width="368" height="44" rx="4" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
  <text x="432" y="276" font-family="Arial" font-size="13" fill="#bbb">이메일을 입력하세요</text>

  <!-- Password Field -->
  <text x="416" y="316" font-family="Arial" font-size="13" font-weight="bold" fill="#555">비밀번호</text>
  <rect x="416" y="326" width="368" height="44" rx="4" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
  <text x="432" y="354" font-family="Arial" font-size="13" fill="#bbb">비밀번호를 입력하세요</text>

  <!-- Remember Me -->
  <rect x="416" y="384" width="14" height="14" rx="3" fill="#E31837"/>
  <text x="436" y="396" font-family="Arial" font-size="13" fill="#666">로그인 상태 유지</text>

  <!-- Login Button -->
  <rect x="416" y="416" width="368" height="50" rx="6" fill="#E31837"/>
  <text x="600" y="447" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">로그인</text>

  <!-- Divider -->
  <line x1="416" y1="490" x2="540" y2="490" stroke="#eee"/>
  <text x="600" y="495" font-family="Arial" font-size="13" fill="#aaa" text-anchor="middle">또는</text>
  <line x1="660" y1="490" x2="784" y2="490" stroke="#eee"/>

  <!-- Social Login Buttons -->
  <rect x="416" y="508" width="368" height="44" rx="6" fill="#FEE500"/>
  <text x="600" y="536" font-family="Arial" font-size="14" font-weight="bold" fill="#3C1E1E" text-anchor="middle">카카오로 시작하기</text>

  <rect x="416" y="560" width="368" height="44" rx="6" fill="#03C75A"/>
  <text x="600" y="588" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">네이버로 시작하기</text>

  <rect x="416" y="612" width="368" height="44" rx="6" fill="white" stroke="#ddd" stroke-width="1.5"/>
  <text x="600" y="640" font-family="Arial" font-size="14" fill="#555" text-anchor="middle">Google로 시작하기</text>

  <!-- Links -->
  <text x="500" y="680" font-family="Arial" font-size="13" fill="#888" text-anchor="middle">회원가입</text>
  <text x="520" y="680" font-family="Arial" font-size="13" fill="#ccc">|</text>
  <text x="660" y="680" font-family="Arial" font-size="13" fill="#888" text-anchor="middle">아이디/비밀번호 찾기</text>
</svg>
